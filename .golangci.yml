version: "2"
run:
  timeout: 5m
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: false
linters:
  enable:
    - revive
    - govet
    - unused
    - whitespace
    - misspell
  disable:
    - errcheck
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
issues:
  exclude-dirs:
    - .github
    - hack
    - vendor
    - frontend
  exclude-rules:
    - path: "_test\\.go$"
      linters:
        - staticcheck
        - ineffassign
